<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScreenSmooth</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon">
                    <div class="record-dot"></div>
                </div>
                <div class="brand-text">
                    <h1>ScreenSmooth</h1>
                    <p>Record like a pro</p>
                </div>
            </div>
        </div>

        <!-- Screen Selection -->
        <div class="section">
            <label for="screen-select" class="section-label">Screen Selection</label>
            <select id="screen-select" class="screen-selector">
                <option value="tab">Browser Tab (Recommended)</option>
                <option value="screen">Entire Screen</option>
                <option value="window">Application Window</option>
            </select>
            <div class="mode-warning-popup" id="mode-warning-popup" style="display: none;">
                <span class="warning-icon-small">⚠️</span>
                <span class="warning-text-small">Auto-Zoom & Cursor disabled</span>
            </div>
        </div>

        <!-- Status Display -->
        <div class="section">
            <div class="status-display">
                <div class="status-indicator">
                    <div class="status-dot" id="status-dot"></div>
                    <span class="status-text" id="status-text">Ready to Record</span>
                </div>
                <div class="recording-indicator" id="recording-indicator" style="display: none;">
                    <div class="pulsing-dot"></div>
                    <span class="recording-text">RECORDING</span>
                </div>
                <div class="timer-display">
                    <span class="timer" id="timer">00:00:00</span>
                </div>
            </div>
        </div>

        <!-- Recording Controls -->
        <div class="section">
            <div class="control-buttons">
                <button class="btn btn-primary" id="start-btn">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
                        <circle cx="12" cy="12" r="10"/>
                    </svg>
                    Start Recording
                </button>
                
                <div class="secondary-controls" id="secondary-controls" style="display: none;">
                    <div class="controls-row">
                        <button class="btn btn-secondary" id="pause-btn">
                            <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
                                <rect x="6" y="4" width="4" height="16"/>
                                <rect x="14" y="4" width="4" height="16"/>
                            </svg>
                            Pause
                        </button>
                    </div>
                    <button class="btn btn-danger btn-large" id="stop-btn">
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="6" y="6" width="12" height="12"/>
                        </svg>
                        Stop Recording
                    </button>
                </div>
            </div>
        </div>


        <!-- License Status -->
        <div class="section">
            <div class="license-status" id="license-status">
                <div class="license-indicator">
                    <div class="license-dot" id="license-dot"></div>
                    <span class="license-text" id="license-text">Free Tier Active</span>
                </div>
                <button class="btn btn-license" id="license-btn">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                    </svg>
                    Upgrade to Premium
                </button>
            </div>
        </div>

        <!-- Features -->
        <div class="section">
            <div class="features">
                <div class="feature-item">
                    <div class="feature-dot"></div>
                    <span>Free basic recording</span>
                </div>
                <div class="feature-item premium-feature">
                    <div class="feature-dot premium"></div>
                    <span>Premium: Auto-zoom & effects</span>
                </div>
                <div class="feature-item">
                    <div class="feature-dot"></div>
                    <span>No account needed</span>
                </div>
            </div>
        </div>

        <!-- Settings -->
        <div class="section">
            <button class="btn btn-settings" id="settings-btn">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12A3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.53c.04-.32.07-.64.07-.97c0-.33-.03-.66-.07-1l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.31-.61-.22l-2.49 1c-.52-.39-1.06-.73-1.69-.98l-.37-2.65A.506.506 0 0 0 14 2h-4c-.25 0-.46.18-.5.42l-.37 2.65c-.63.25-1.17.59-1.69.98l-2.49-1c-.22-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64L4.57 11c-.04.34-.07.67-.07 1c0 .33.03.65.07.97l-2.11 1.66c-.19.15-.25.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1.01c.52.4 1.06.74 1.69.99l.37 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.37-2.65c.63-.26 1.17-.59 1.69-.99l2.49 1.01c.22.08.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.66Z"/>
                </svg>
                Settings
            </button>
        </div>
    </div>

    <script src="../license/simple-license.js"></script>
    <script src="popup.js"></script>
</body>
</html>
